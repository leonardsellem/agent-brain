<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">

<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="rosehead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
  <style>
    text { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
    .bg { fill: #020617; }
    .panel { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; }
    .gridPanel { fill: url(#grid); opacity: .78; }
    .title { fill: #f8fafc; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 13px; }
    .label { fill: #f8fafc; font-size: 13px; font-weight: 700; }
    .smallLabel { fill: #f8fafc; font-size: 11px; font-weight: 700; }
    .sub { fill: #94a3b8; font-size: 10px; }
    .tiny { fill: #94a3b8; font-size: 8px; }
    .muted { fill: #64748b; font-size: 9px; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .safeArrow { stroke: #34d399; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .riskArrow { stroke: #fb7185; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; marker-end: url(#rosehead); }
    .frontend { fill: rgba(8,51,68,.45); stroke: #22d3ee; }
    .backend { fill: rgba(6,78,59,.45); stroke: #34d399; }
    .database { fill: rgba(76,29,149,.45); stroke: #a78bfa; }
    .cloud { fill: rgba(120,53,15,.32); stroke: #fbbf24; }
    .securityFill { fill: rgba(136,19,55,.38); stroke: #fb7185; }
    .bus { fill: rgba(251,146,60,.28); stroke: #fb923c; }
    .external { fill: rgba(30,41,59,.62); stroke: #94a3b8; }
    .box { stroke-width: 1.8; }
    .boundary { fill: rgba(15,23,42,.35); stroke: #fbbf24; stroke-width: 1.4; stroke-dasharray: 8 5; }
    .safety { fill: rgba(136,19,55,.12); stroke: #fb7185; stroke-width: 1.35; stroke-dasharray: 5 5; }
    .chipText { fill: #e2e8f0; font-size: 9px; font-weight: 600; }
  </style>
</defs>
<title id="title">Guarded Live Apply on Real Configs</title>
<desc id="desc">Safe live use means explicit roots, exact fingerprints, snapshots, verification, and rollback</desc>
<rect width="1200" height="760" class="bg"/>
<rect x="70" y="104" width="1060" height="492" rx="14" class="panel"/>
<rect x="94" y="128" width="1012" height="444" rx="10" class="gridPanel"/>
<circle cx="84" cy="44" r="6" fill="#22d3ee" filter="url(#glow)"/>
<text x="104" y="50" class="title">Guarded Live Apply on Real Configs</text>
<text x="104" y="78" class="subtitle">Safe live use means explicit roots, exact fingerprints, snapshots, verification, and rollback</text>

<path class="arrow" d="M 156 300 H 260"/>
<path class="arrow" d="M 402 300 H 506"/>
<path class="arrow" d="M 648 300 H 752"/>
<path class="arrow" d="M 894 300 H 998"/>
<path class="riskArrow" d="M 568 366 C 568 446 322 446 322 366"/><text x="445" y="462" text-anchor="middle" class="tiny">fingerprint drift cancels approval</text>
<path class="safeArrow" d="M 814 366 C 814 490 568 490 568 366"/><text x="691" y="506" text-anchor="middle" class="tiny">snapshot makes rollback concrete</text>

<rect x="100" y="176" width="980" height="318" rx="12" class="safety"/>
<text x="590" y="169" text-anchor="middle" fill="#fb7185" font-size="10" font-weight="700">live mutation boundary: no write without matching evidence</text>

<rect x="92" y="246" width="128" height="108" rx="6" fill="#0f172a"/>
<rect x="92" y="246" width="128" height="108" rx="6" class="box external"/>
<text x="156" y="266" text-anchor="middle" class="smallLabel">explicit roots</text>
<text x="156" y="284" text-anchor="middle" class="sub">.codex</text>
<text x="156" y="298" text-anchor="middle" class="sub">.claude</text>
<text x="156" y="312" text-anchor="middle" class="sub">.dotstate</text>
<rect x="260" y="246" width="142" height="108" rx="6" fill="#0f172a"/>
<rect x="260" y="246" width="142" height="108" rx="6" class="box backend"/>
<text x="331" y="266" text-anchor="middle" class="smallLabel">dry-run plan</text>
<text x="331" y="284" text-anchor="middle" class="sub">create/update</text>
<text x="331" y="298" text-anchor="middle" class="sub">move/symlink</text>
<rect x="506" y="246" width="142" height="108" rx="6" fill="#0f172a"/>
<rect x="506" y="246" width="142" height="108" rx="6" class="box bus"/>
<text x="577" y="266" text-anchor="middle" class="smallLabel">fingerprint</text>
<text x="577" y="284" text-anchor="middle" class="sub">exact operation</text>
<text x="577" y="298" text-anchor="middle" class="sub">set hash</text>
<rect x="752" y="246" width="142" height="108" rx="6" fill="#0f172a"/>
<rect x="752" y="246" width="142" height="108" rx="6" class="box database"/>
<text x="823" y="266" text-anchor="middle" class="smallLabel">baseline</text>
<text x="823" y="284" text-anchor="middle" class="sub">snapshot before</text>
<text x="823" y="298" text-anchor="middle" class="sub">any write</text>
<rect x="998" y="246" width="82" height="108" rx="6" fill="#0f172a"/>
<rect x="998" y="246" width="82" height="108" rx="6" class="box frontend"/>
<text x="1039" y="266" text-anchor="middle" class="smallLabel">apply</text>
<text x="1039" y="284" text-anchor="middle" class="sub">planned</text>
<text x="1039" y="298" text-anchor="middle" class="sub">paths only</text>

<rect x="260" y="408" width="142" height="62" rx="6" fill="#0f172a"/>
<rect x="260" y="408" width="142" height="62" rx="6" class="box securityFill"/>
<text x="331" y="428" text-anchor="middle" class="smallLabel">secret policy</text>
<text x="331" y="446" text-anchor="middle" class="sub">exclude by default</text>
<rect x="506" y="408" width="142" height="62" rx="6" fill="#0f172a"/>
<rect x="506" y="408" width="142" height="62" rx="6" class="box database"/>
<text x="577" y="428" text-anchor="middle" class="smallLabel">lock file</text>
<text x="577" y="446" text-anchor="middle" class="sub">generated ownership</text>
<rect x="752" y="408" width="142" height="62" rx="6" fill="#0f172a"/>
<rect x="752" y="408" width="142" height="62" rx="6" class="box backend"/>
<text x="823" y="428" text-anchor="middle" class="smallLabel">verify</text>
<text x="823" y="446" text-anchor="middle" class="sub">drift + risks</text>
<rect x="998" y="408" width="82" height="62" rx="6" fill="#0f172a"/>
<rect x="998" y="408" width="82" height="62" rx="6" class="box securityFill"/>
<text x="1039" y="428" text-anchor="middle" class="smallLabel">rollback</text>
<text x="1039" y="446" text-anchor="middle" class="sub">restore</text>

<rect x="80" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="102" cy="652" r="4" fill="#34d399" filter="url(#glow)"/>
<text x="116" y="657" class="label">Safe To Run Means</text>
<text x="102" y="684" class="sub">- user supplies live roots</text>
<text x="102" y="701" class="sub">- dry-run reviewed before mutation</text>
<text x="102" y="718" class="sub">- confirmation names exact fingerprint</text>
<rect x="435" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="457" cy="652" r="4" fill="#fb7185" filter="url(#glow)"/>
<text x="471" y="657" class="label">What Stays Out</text>
<text x="457" y="684" class="sub">- auth and secret-like files</text>
<text x="457" y="701" class="sub">- runtime caches and history</text>
<text x="457" y="718" class="sub">- machine-local overrides</text>
<rect x="790" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="812" cy="652" r="4" fill="#a78bfa" filter="url(#glow)"/>
<text x="826" y="657" class="label">Evidence Afterward</text>
<text x="812" y="684" class="sub">- materialization lock written</text>
<text x="812" y="701" class="sub">- verify reports health</text>
<text x="812" y="718" class="sub">- rollback metadata remains available</text>
<text x="600" y="744" text-anchor="middle" class="tiny">Agent Brain - guarded live safety model</text>
</svg>
