<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img">
<defs>
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path class="grid" d="M 44 0 L 0 0 0 44" fill="none"/>
  </pattern>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="rosehead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
  <style>
  .bg { fill: #020617; }
  .grid { stroke: #1e293b; stroke-width: .55; opacity: .65; }
  .card { fill: #0f172a; stroke: #1e293b; stroke-width: 1.3; }
  .boundary { fill: rgba(15,23,42,.35); stroke: #fbbf24; stroke-width: 1.4; stroke-dasharray: 8 5; }
  .security { fill: rgba(136,19,55,.12); stroke: #fb7185; stroke-width: 1.25; stroke-dasharray: 5 5; }
  text { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
  .title { fill: #f8fafc; font-size: 24px; font-weight: 700; }
  .subtitle { fill: #94a3b8; font-size: 13px; }
  .label { fill: #f8fafc; font-size: 13px; font-weight: 700; }
  .sub { fill: #94a3b8; font-size: 10px; }
  .tiny { fill: #94a3b8; font-size: 8px; }
  .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  .arrow2 { stroke: #fb7185; stroke-width: 1.7; fill: none; stroke-dasharray: 5 4; marker-end: url(#rosehead); }
  .frontend { fill: rgba(8,51,68,.45); stroke: #22d3ee; }
  .backend { fill: rgba(6,78,59,.45); stroke: #34d399; }
  .database { fill: rgba(76,29,149,.45); stroke: #a78bfa; }
  .cloud { fill: rgba(120,53,15,.32); stroke: #fbbf24; }
  .securityFill { fill: rgba(136,19,55,.38); stroke: #fb7185; }
  .bus { fill: rgba(251,146,60,.28); stroke: #fb923c; }
  .external { fill: rgba(30,41,59,.62); stroke: #94a3b8; }
  .box { stroke-width: 1.8; rx: 8; }
</style>
</defs>
<rect width="1200" height="760" class="bg"/>
<rect x="80" y="112" width="1040" height="470" rx="14" class="card"/>
<rect x="104" y="136" width="992" height="398" fill="url(#grid)" opacity=".9"/>
<circle cx="88" cy="44" r="6" fill="#22d3ee" filter="url(#glow)"/>
<text x="108" y="50" class="title">Agent Brain Product Model</text>
<text x="108" y="78" class="subtitle">Portable capability intent, not a dotfiles mirror</text>
<path class="arrow" d="M 238 338 H 348"/><text x="293" y="326" text-anchor="middle" class="tiny">scan</text>
<path class="arrow" d="M 516 338 H 626"/><text x="571" y="326" text-anchor="middle" class="tiny">adopt</text>
<path class="arrow" d="M 794 338 H 904"/><text x="849" y="326" text-anchor="middle" class="tiny">materialize</text>
<path class="arrow2" d="M 432 412 C 432 490, 720 490, 720 412"/><text x="576" y="503" text-anchor="middle" class="tiny">semantic conflict explanation</text>
<rect x="126" y="285" width="112" height="106" rx="8" fill="#0f172a"/>
<rect x="126" y="285" width="112" height="106" rx="8" class="box external"/>
<text x="182.0" y="311" text-anchor="middle" class="label">Import Sources</text>
<text x="182.0" y="333" text-anchor="middle" class="sub">dotstate / chezmoi</text>
<text x="182.0" y="348" text-anchor="middle" class="sub">stow / home dirs</text><rect x="348" y="272" width="168" height="132" rx="8" fill="#0f172a"/>
<rect x="348" y="272" width="168" height="132" rx="8" class="box backend"/>
<text x="432.0" y="298" text-anchor="middle" class="label">Ownership Classifier</text>
<text x="432.0" y="320" text-anchor="middle" class="sub">portable / generated</text>
<text x="432.0" y="335" text-anchor="middle" class="sub">native / runtime</text>
<text x="432.0" y="350" text-anchor="middle" class="sub">secret / unknown</text><rect x="626" y="260" width="168" height="156" rx="8" fill="#0f172a"/>
<rect x="626" y="260" width="168" height="156" rx="8" class="box database"/>
<text x="710.0" y="286" text-anchor="middle" class="label">Agent Brain Repo</text>
<text x="710.0" y="308" text-anchor="middle" class="sub">packages</text>
<text x="710.0" y="323" text-anchor="middle" class="sub">profiles</text>
<text x="710.0" y="338" text-anchor="middle" class="sub">provenance + exclusions</text><rect x="904" y="282" width="136" height="112" rx="8" fill="#0f172a"/>
<rect x="904" y="282" width="136" height="112" rx="8" class="box frontend"/>
<text x="972.0" y="308" text-anchor="middle" class="label">App Targets</text>
<text x="972.0" y="330" text-anchor="middle" class="sub">Claude Code</text>
<text x="972.0" y="345" text-anchor="middle" class="sub">Codex</text>
<rect x="596" y="238" width="226" height="204" rx="12" class="boundary"/>
<text x="709" y="232" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="JetBrains Mono, monospace">canonical source of truth</text>
<rect x="80" y="620" width="330" height="120" rx="10" class="card"/>
<circle cx="102" cy="649" r="4" fill="#22d3ee" filter="url(#glow)"/>
<text x="116" y="654" class="label">Import carefully</text>
<text x="102" y="680" class="sub">• Start from existing messy local reality</text>
<text x="102" y="697" class="sub">• Classify before adopting anything</text>
<text x="102" y="714" class="sub">• Keep secrets and runtime out by default</text><rect x="435" y="620" width="330" height="120" rx="10" class="card"/>
<circle cx="457" cy="649" r="4" fill="#34d399" filter="url(#glow)"/>
<text x="471" y="654" class="label">Keep intent portable</text>
<text x="457" y="680" class="sub">• Packages and profiles are durable</text>
<text x="457" y="697" class="sub">• Adapters preserve app-specific semantics</text>
<text x="457" y="714" class="sub">• Locks map intent to generated targets</text><rect x="790" y="620" width="330" height="120" rx="10" class="card"/>
<circle cx="812" cy="649" r="4" fill="#a78bfa" filter="url(#glow)"/>
<text x="826" y="654" class="label">Explain conflicts</text>
<text x="812" y="680" class="sub">• Resolve by ownership category</text>
<text x="812" y="697" class="sub">• Avoid generic dotfile merge guesses</text>
<text x="812" y="714" class="sub">• Bootstrap second machines cleanly</text><text x="600" y="742" text-anchor="middle" class="tiny">Agent Brain • product model overview</text>
</svg>
