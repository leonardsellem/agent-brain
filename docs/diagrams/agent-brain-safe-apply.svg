<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img">
<defs>
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path class="grid" d="M 44 0 L 0 0 0 44" fill="none"/>
  </pattern>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="rosehead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
  <style>
  .bg { fill: #020617; }
  .grid { stroke: #1e293b; stroke-width: .55; opacity: .65; }
  .card { fill: #0f172a; stroke: #1e293b; stroke-width: 1.3; }
  .boundary { fill: rgba(15,23,42,.35); stroke: #fbbf24; stroke-width: 1.4; stroke-dasharray: 8 5; }
  .security { fill: rgba(136,19,55,.12); stroke: #fb7185; stroke-width: 1.25; stroke-dasharray: 5 5; }
  text { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
  .title { fill: #f8fafc; font-size: 24px; font-weight: 700; }
  .subtitle { fill: #94a3b8; font-size: 13px; }
  .label { fill: #f8fafc; font-size: 13px; font-weight: 700; }
  .sub { fill: #94a3b8; font-size: 10px; }
  .tiny { fill: #94a3b8; font-size: 8px; }
  .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  .arrow2 { stroke: #fb7185; stroke-width: 1.7; fill: none; stroke-dasharray: 5 4; marker-end: url(#rosehead); }
  .frontend { fill: rgba(8,51,68,.45); stroke: #22d3ee; }
  .backend { fill: rgba(6,78,59,.45); stroke: #34d399; }
  .database { fill: rgba(76,29,149,.45); stroke: #a78bfa; }
  .cloud { fill: rgba(120,53,15,.32); stroke: #fbbf24; }
  .securityFill { fill: rgba(136,19,55,.38); stroke: #fb7185; }
  .bus { fill: rgba(251,146,60,.28); stroke: #fb923c; }
  .external { fill: rgba(30,41,59,.62); stroke: #94a3b8; }
  .box { stroke-width: 1.8; rx: 8; }
</style>
</defs>
<rect width="1200" height="760" class="bg"/>
<rect x="80" y="112" width="1040" height="470" rx="14" class="card"/>
<rect x="104" y="136" width="992" height="398" fill="url(#grid)" opacity=".9"/>
<circle cx="88" cy="44" r="6" fill="#22d3ee" filter="url(#glow)"/>
<text x="108" y="50" class="title">Safe Live Apply Transaction</text>
<text x="108" y="78" class="subtitle">Dry-run fingerprint, snapshot, lock, verify, rollback</text>
<path class="arrow" d="M 190 330 H 305"/><text x="247" y="318" text-anchor="middle" class="tiny">1. request</text>
<path class="arrow" d="M 455 330 H 570"/><text x="512" y="318" text-anchor="middle" class="tiny">2. read intent</text>
<path class="arrow" d="M 720 330 H 835"/><text x="777" y="318" text-anchor="middle" class="tiny">3. dry-run</text>
<path class="arrow2" d="M 902 398 C 858 496, 364 496, 322 398"/><text x="612" y="510" text-anchor="middle" class="tiny">confirmed fingerprint unlocks mutation</text>
<path class="arrow" d="M 902 250 C 902 205, 720 205, 720 250"/><text x="812" y="197" text-anchor="middle" class="tiny">snapshot before write</text>
<rect x="118" y="286" width="72" height="88" rx="8" fill="#0f172a"/>
<rect x="118" y="286" width="72" height="88" rx="8" class="box external"/>
<text x="154.0" y="312" text-anchor="middle" class="label">User</text>
<text x="154.0" y="334" text-anchor="middle" class="sub">approves</text>
<text x="154.0" y="349" text-anchor="middle" class="sub">explicit roots</text><rect x="305" y="260" width="150" height="140" rx="8" fill="#0f172a"/>
<rect x="305" y="260" width="150" height="140" rx="8" class="box backend"/>
<text x="380.0" y="286" text-anchor="middle" class="label">agent-brain CLI</text>
<text x="380.0" y="308" text-anchor="middle" class="sub">plan / apply</text>
<text x="380.0" y="323" text-anchor="middle" class="sub">verify</text>
<text x="380.0" y="338" text-anchor="middle" class="sub">rollback</text><rect x="570" y="264" width="150" height="132" rx="8" fill="#0f172a"/>
<rect x="570" y="264" width="150" height="132" rx="8" class="box database"/>
<text x="645.0" y="290" text-anchor="middle" class="label">Agent Brain Repo</text>
<text x="645.0" y="312" text-anchor="middle" class="sub">packages</text>
<text x="645.0" y="327" text-anchor="middle" class="sub">profiles</text>
<text x="645.0" y="342" text-anchor="middle" class="sub">provenance</text><rect x="835" y="250" width="150" height="160" rx="8" fill="#0f172a"/>
<rect x="835" y="250" width="150" height="160" rx="8" class="box frontend"/>
<text x="910.0" y="276" text-anchor="middle" class="label">Target Root</text>
<text x="910.0" y="298" text-anchor="middle" class="sub">Claude/Codex</text>
<text x="910.0" y="313" text-anchor="middle" class="sub">generated paths</text>
<text x="910.0" y="328" text-anchor="middle" class="sub">materialization lock</text>
<rect x="286" y="238" width="720" height="202" rx="12" class="security"/>
<text x="646" y="234" text-anchor="middle" fill="#fb7185" font-size="10" font-family="JetBrains Mono, monospace">live mutation boundary</text>
<rect x="80" y="620" width="330" height="120" rx="10" class="card"/>
<circle cx="102" cy="649" r="4" fill="#22d3ee" filter="url(#glow)"/>
<text x="116" y="654" class="label">Before mutation</text>
<text x="102" y="680" class="sub">• Explicit roots only</text>
<text x="102" y="697" class="sub">• Exact dry-run operation set</text>
<text x="102" y="714" class="sub">• Fingerprint must match</text><rect x="435" y="620" width="330" height="120" rx="10" class="card"/>
<circle cx="457" cy="649" r="4" fill="#34d399" filter="url(#glow)"/>
<text x="471" y="654" class="label">During apply</text>
<text x="457" y="680" class="sub">• Capture baseline snapshot</text>
<text x="457" y="697" class="sub">• Write only planned paths</text>
<text x="457" y="714" class="sub">• Record materialization lock</text><rect x="790" y="620" width="330" height="120" rx="10" class="card"/>
<circle cx="812" cy="649" r="4" fill="#a78bfa" filter="url(#glow)"/>
<text x="826" y="654" class="label">After apply</text>
<text x="812" y="680" class="sub">• Verify generated state</text>
<text x="812" y="697" class="sub">• Report remaining risks</text>
<text x="812" y="714" class="sub">• Keep rollback metadata</text><text x="600" y="742" text-anchor="middle" class="tiny">Agent Brain • safe apply flow</text>
</svg>
