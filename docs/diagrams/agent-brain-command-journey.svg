<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">

<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="rosehead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
  <style>
    text { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
    .bg { fill: #020617; }
    .panel { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; }
    .gridPanel { fill: url(#grid); opacity: .78; }
    .title { fill: #f8fafc; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 13px; }
    .label { fill: #f8fafc; font-size: 13px; font-weight: 700; }
    .smallLabel { fill: #f8fafc; font-size: 11px; font-weight: 700; }
    .sub { fill: #94a3b8; font-size: 10px; }
    .tiny { fill: #94a3b8; font-size: 8px; }
    .muted { fill: #64748b; font-size: 9px; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .safeArrow { stroke: #34d399; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .riskArrow { stroke: #fb7185; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; marker-end: url(#rosehead); }
    .frontend { fill: rgba(8,51,68,.45); stroke: #22d3ee; }
    .backend { fill: rgba(6,78,59,.45); stroke: #34d399; }
    .database { fill: rgba(76,29,149,.45); stroke: #a78bfa; }
    .cloud { fill: rgba(120,53,15,.32); stroke: #fbbf24; }
    .securityFill { fill: rgba(136,19,55,.38); stroke: #fb7185; }
    .bus { fill: rgba(251,146,60,.28); stroke: #fb923c; }
    .external { fill: rgba(30,41,59,.62); stroke: #94a3b8; }
    .box { stroke-width: 1.8; }
    .boundary { fill: rgba(15,23,42,.35); stroke: #fbbf24; stroke-width: 1.4; stroke-dasharray: 8 5; }
    .safety { fill: rgba(136,19,55,.12); stroke: #fb7185; stroke-width: 1.35; stroke-dasharray: 5 5; }
    .chipText { fill: #e2e8f0; font-size: 9px; font-weight: 600; }
  </style>
</defs>
<title id="title">Command Journey for a Cautious Power User</title>
<desc id="desc">Every command answers a trust question before the next command is safe</desc>
<rect width="1200" height="760" class="bg"/>
<rect x="70" y="104" width="1060" height="492" rx="14" class="panel"/>
<rect x="94" y="128" width="1012" height="444" rx="10" class="gridPanel"/>
<circle cx="84" cy="44" r="6" fill="#22d3ee" filter="url(#glow)"/>
<text x="104" y="50" class="title">Command Journey for a Cautious Power User</text>
<text x="104" y="78" class="subtitle">Every command answers a trust question before the next command is safe</text>

<path class="arrow" d="M 214 270 H 312"/>
<path class="arrow" d="M 452 270 H 550"/>
<path class="arrow" d="M 690 270 H 788"/>
<path class="arrow" d="M 928 270 H 1026"/>
<path class="safeArrow" d="M 600 344 V 420 H 214"/>
<path class="safeArrow" d="M 600 344 V 420 H 452"/>
<path class="safeArrow" d="M 600 344 V 420 H 690"/>
<path class="riskArrow" d="M 452 344 C 452 478 928 478 928 344"/>

<rect x="88" y="220" width="126" height="96" rx="6" fill="#0f172a"/>
<rect x="88" y="220" width="126" height="96" rx="6" class="box backend"/>
<text x="151" y="240" text-anchor="middle" class="smallLabel">doctor</text>
<text x="151" y="258" text-anchor="middle" class="sub">What exists?</text>
<text x="151" y="272" text-anchor="middle" class="sub">What is risky?</text>
<rect x="312" y="220" width="140" height="96" rx="6" fill="#0f172a"/>
<rect x="312" y="220" width="140" height="96" rx="6" class="box database"/>
<text x="382" y="240" text-anchor="middle" class="smallLabel">import</text>
<text x="382" y="258" text-anchor="middle" class="sub">What is portable?</text>
<text x="382" y="272" text-anchor="middle" class="sub">What is excluded?</text>
<rect x="550" y="220" width="140" height="96" rx="6" fill="#0f172a"/>
<rect x="550" y="220" width="140" height="96" rx="6" class="box bus"/>
<text x="620" y="240" text-anchor="middle" class="smallLabel">plan</text>
<text x="620" y="258" text-anchor="middle" class="sub">What would change?</text>
<text x="620" y="272" text-anchor="middle" class="sub">What is the hash?</text>
<rect x="788" y="220" width="140" height="96" rx="6" fill="#0f172a"/>
<rect x="788" y="220" width="140" height="96" rx="6" class="box securityFill"/>
<text x="858" y="240" text-anchor="middle" class="smallLabel">apply</text>
<text x="858" y="258" text-anchor="middle" class="sub">Confirm exact</text>
<text x="858" y="272" text-anchor="middle" class="sub">fingerprint</text>
<rect x="1026" y="220" width="96" height="96" rx="6" fill="#0f172a"/>
<rect x="1026" y="220" width="96" height="96" rx="6" class="box frontend"/>
<text x="1074" y="240" text-anchor="middle" class="smallLabel">verify</text>
<text x="1074" y="258" text-anchor="middle" class="sub">Healthy?</text>
<text x="1074" y="272" text-anchor="middle" class="sub">Drift?</text>

<rect x="146" y="420" width="136" height="82" rx="6" fill="#0f172a"/>
<rect x="146" y="420" width="136" height="82" rx="6" class="box external"/>
<text x="214" y="440" text-anchor="middle" class="smallLabel">explain-conflict</text>
<text x="214" y="458" text-anchor="middle" class="sub">What owns</text>
<text x="214" y="472" text-anchor="middle" class="sub">this path?</text>
<rect x="532" y="420" width="136" height="82" rx="6" fill="#0f172a"/>
<rect x="532" y="420" width="136" height="82" rx="6" class="box frontend"/>
<text x="600" y="440" text-anchor="middle" class="smallLabel">bootstrap</text>
<text x="600" y="458" text-anchor="middle" class="sub">Second machine</text>
<text x="600" y="472" text-anchor="middle" class="sub">from intent</text>
<rect x="918" y="420" width="136" height="82" rx="6" fill="#0f172a"/>
<rect x="918" y="420" width="136" height="82" rx="6" class="box securityFill"/>
<text x="986" y="440" text-anchor="middle" class="smallLabel">rollback</text>
<text x="986" y="458" text-anchor="middle" class="sub">Restore</text>
<text x="986" y="472" text-anchor="middle" class="sub">snapshot</text>

<text x="151" y="198" text-anchor="middle" class="tiny">read-only diagnosis</text>
<text x="382" y="198" text-anchor="middle" class="tiny">repo creation</text>
<text x="620" y="198" text-anchor="middle" class="tiny">review gate</text>
<text x="858" y="198" text-anchor="middle" class="tiny">mutation gate</text>
<text x="1074" y="198" text-anchor="middle" class="tiny">health gate</text>

<rect x="80" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="102" cy="652" r="4" fill="#22d3ee" filter="url(#glow)"/>
<text x="116" y="657" class="label">Trust Questions</text>
<text x="102" y="684" class="sub">- what owns this file?</text>
<text x="102" y="701" class="sub">- what will be written?</text>
<text x="102" y="718" class="sub">- can I undo it?</text>
<rect x="435" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="457" cy="652" r="4" fill="#34d399" filter="url(#glow)"/>
<text x="471" y="657" class="label">Agent-Friendly</text>
<text x="457" y="684" class="sub">- text output for humans</text>
<text x="457" y="701" class="sub">- JSON output for agents</text>
<text x="457" y="718" class="sub">- commands compose into protocols</text>
<rect x="790" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="812" cy="652" r="4" fill="#a78bfa" filter="url(#glow)"/>
<text x="826" y="657" class="label">Release Surface</text>
<text x="812" y="684" class="sub">- npm install first</text>
<text x="812" y="701" class="sub">- fixtures and disposable roots</text>
<text x="812" y="718" class="sub">- explicit live roots when approved</text>
<text x="600" y="744" text-anchor="middle" class="tiny">Agent Brain - CLI command map</text>
</svg>
