<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">

<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="rosehead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
  <style>
    text { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
    .bg { fill: #020617; }
    .panel { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; }
    .gridPanel { fill: url(#grid); opacity: .78; }
    .title { fill: #f8fafc; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 13px; }
    .label { fill: #f8fafc; font-size: 13px; font-weight: 700; }
    .smallLabel { fill: #f8fafc; font-size: 11px; font-weight: 700; }
    .sub { fill: #94a3b8; font-size: 10px; }
    .tiny { fill: #94a3b8; font-size: 8px; }
    .muted { fill: #64748b; font-size: 9px; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .safeArrow { stroke: #34d399; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .riskArrow { stroke: #fb7185; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; marker-end: url(#rosehead); }
    .frontend { fill: rgba(8,51,68,.45); stroke: #22d3ee; }
    .backend { fill: rgba(6,78,59,.45); stroke: #34d399; }
    .database { fill: rgba(76,29,149,.45); stroke: #a78bfa; }
    .cloud { fill: rgba(120,53,15,.32); stroke: #fbbf24; }
    .securityFill { fill: rgba(136,19,55,.38); stroke: #fb7185; }
    .bus { fill: rgba(251,146,60,.28); stroke: #fb923c; }
    .external { fill: rgba(30,41,59,.62); stroke: #94a3b8; }
    .box { stroke-width: 1.8; }
    .boundary { fill: rgba(15,23,42,.35); stroke: #fbbf24; stroke-width: 1.4; stroke-dasharray: 8 5; }
    .safety { fill: rgba(136,19,55,.12); stroke: #fb7185; stroke-width: 1.35; stroke-dasharray: 5 5; }
    .chipText { fill: #e2e8f0; font-size: 9px; font-weight: 600; }
  </style>
</defs>
<title id="title">Canonical Model and Adapter Boundary</title>
<desc id="desc">Packages and profiles are portable; Claude Code and Codex stay app-specific targets</desc>
<rect width="1200" height="760" class="bg"/>
<rect x="70" y="104" width="1060" height="492" rx="14" class="panel"/>
<rect x="94" y="128" width="1012" height="444" rx="10" class="gridPanel"/>
<circle cx="84" cy="44" r="6" fill="#22d3ee" filter="url(#glow)"/>
<text x="104" y="50" class="title">Canonical Model and Adapter Boundary</text>
<text x="104" y="78" class="subtitle">Packages and profiles are portable; Claude Code and Codex stay app-specific targets</text>

<path class="arrow" d="M 288 330 H 390"/><text x="339" y="313" class="tiny" text-anchor="middle">classify</text>
<path class="arrow" d="M 390 410 H 288"/><text x="339" y="433" class="tiny" text-anchor="middle">exclusions report</text>
<path class="arrow" d="M 650 330 H 782"/><text x="716" y="313" class="tiny" text-anchor="middle">materialize</text>
<path class="safeArrow" d="M 908 430 C 908 520 520 520 520 446"/><text x="714" y="536" class="tiny" text-anchor="middle">bootstrap another machine from intent, not copied app homes</text>

<rect x="112" y="198" width="176" height="266" rx="12" class="boundary"/>
<text x="200" y="191" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">import sources</text>
<rect x="132" y="224" width="136" height="54" rx="6" fill="#0f172a"/>
<rect x="132" y="224" width="136" height="54" rx="6" class="box external"/>
<text x="200" y="244" text-anchor="middle" class="smallLabel">dotstate</text>
<text x="200" y="262" text-anchor="middle" class="sub">tracked files</text>
<rect x="132" y="296" width="136" height="54" rx="6" fill="#0f172a"/>
<rect x="132" y="296" width="136" height="54" rx="6" class="box external"/>
<text x="200" y="316" text-anchor="middle" class="smallLabel">chezmoi / stow</text>
<text x="200" y="334" text-anchor="middle" class="sub">managed paths</text>
<rect x="132" y="368" width="136" height="54" rx="6" fill="#0f172a"/>
<rect x="132" y="368" width="136" height="54" rx="6" class="box external"/>
<text x="200" y="388" text-anchor="middle" class="smallLabel">home dirs</text>
<text x="200" y="406" text-anchor="middle" class="sub">legacy reality</text>

<rect x="390" y="184" width="260" height="292" rx="12" class="boundary"/>
<text x="520" y="177" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">canonical source of truth</text>
<rect x="418" y="214" width="204" height="46" rx="6" fill="#0f172a"/>
<rect x="418" y="214" width="204" height="46" rx="6" class="box database"/>
<text x="520" y="234" text-anchor="middle" class="smallLabel">packages</text>
<text x="520" y="252" text-anchor="middle" class="sub">skills, prompts, MCP intent</text>
<rect x="418" y="276" width="204" height="46" rx="6" fill="#0f172a"/>
<rect x="418" y="276" width="204" height="46" rx="6" class="box database"/>
<text x="520" y="296" text-anchor="middle" class="smallLabel">profiles</text>
<text x="520" y="314" text-anchor="middle" class="sub">what applies together</text>
<rect x="418" y="338" width="204" height="46" rx="6" fill="#0f172a"/>
<rect x="418" y="338" width="204" height="46" rx="6" class="box database"/>
<text x="520" y="358" text-anchor="middle" class="smallLabel">provenance</text>
<text x="520" y="376" text-anchor="middle" class="sub">where it came from</text>
<rect x="418" y="400" width="204" height="46" rx="6" fill="#0f172a"/>
<rect x="418" y="400" width="204" height="46" rx="6" class="box database"/>
<text x="520" y="420" text-anchor="middle" class="smallLabel">exclusions + locks</text>
<text x="520" y="438" text-anchor="middle" class="sub">why not source, where generated</text>

<rect x="782" y="198" width="298" height="266" rx="12" class="safety"/>
<text x="931" y="191" text-anchor="middle" fill="#fb7185" font-size="10" font-weight="700">materialization targets</text>
<rect x="806" y="232" width="116" height="70" rx="6" fill="#0f172a"/>
<rect x="806" y="232" width="116" height="70" rx="6" class="box frontend"/>
<text x="864" y="252" text-anchor="middle" class="smallLabel">Claude Code</text>
<text x="864" y="270" text-anchor="middle" class="sub">skill layout</text>
<text x="864" y="284" text-anchor="middle" class="sub">native state</text>
<rect x="940" y="232" width="116" height="70" rx="6" fill="#0f172a"/>
<rect x="940" y="232" width="116" height="70" rx="6" class="box frontend"/>
<text x="998" y="252" text-anchor="middle" class="smallLabel">Codex</text>
<text x="998" y="270" text-anchor="middle" class="sub">profiles</text>
<text x="998" y="284" text-anchor="middle" class="sub">AGENTS.md</text>
<rect x="806" y="338" width="250" height="70" rx="6" fill="#0f172a"/>
<rect x="806" y="338" width="250" height="70" rx="6" class="box backend"/>
<text x="931" y="358" text-anchor="middle" class="smallLabel">Target adapters</text>
<text x="931" y="376" text-anchor="middle" class="sub">preserve app semantics</text>
<text x="931" y="390" text-anchor="middle" class="sub">replaceable as layouts evolve</text>

<rect x="80" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="102" cy="652" r="4" fill="#a78bfa" filter="url(#glow)"/>
<text x="116" y="657" class="label">Portable</text>
<text x="102" y="684" class="sub">- packages and profiles live in git</text>
<text x="102" y="701" class="sub">- provenance explains adoption</text>
<text x="102" y="718" class="sub">- locks connect intent to targets</text>
<rect x="435" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="457" cy="652" r="4" fill="#fb7185" filter="url(#glow)"/>
<text x="471" y="657" class="label">Excluded By Default</text>
<text x="457" y="684" class="sub">- auth, tokens, session files</text>
<text x="457" y="701" class="sub">- runtime history and caches</text>
<text x="457" y="718" class="sub">- machine-local overrides</text>
<rect x="790" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="812" cy="652" r="4" fill="#34d399" filter="url(#glow)"/>
<text x="826" y="657" class="label">Durable</text>
<text x="812" y="684" class="sub">- adapters can evolve</text>
<text x="812" y="701" class="sub">- second machines bootstrap cleanly</text>
<text x="812" y="718" class="sub">- no universal fake plugin format</text>
<text x="600" y="744" text-anchor="middle" class="tiny">Agent Brain - canonical model</text>
</svg>
