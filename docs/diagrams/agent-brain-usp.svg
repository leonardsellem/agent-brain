<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">

<defs>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <marker id="rosehead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
  </marker>
  <style>
    text { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
    .bg { fill: #020617; }
    .panel { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; }
    .gridPanel { fill: url(#grid); opacity: .78; }
    .title { fill: #f8fafc; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 13px; }
    .label { fill: #f8fafc; font-size: 13px; font-weight: 700; }
    .smallLabel { fill: #f8fafc; font-size: 11px; font-weight: 700; }
    .sub { fill: #94a3b8; font-size: 10px; }
    .tiny { fill: #94a3b8; font-size: 8px; }
    .muted { fill: #64748b; font-size: 9px; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .safeArrow { stroke: #34d399; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .riskArrow { stroke: #fb7185; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; marker-end: url(#rosehead); }
    .frontend { fill: rgba(8,51,68,.45); stroke: #22d3ee; }
    .backend { fill: rgba(6,78,59,.45); stroke: #34d399; }
    .database { fill: rgba(76,29,149,.45); stroke: #a78bfa; }
    .cloud { fill: rgba(120,53,15,.32); stroke: #fbbf24; }
    .securityFill { fill: rgba(136,19,55,.38); stroke: #fb7185; }
    .bus { fill: rgba(251,146,60,.28); stroke: #fb923c; }
    .external { fill: rgba(30,41,59,.62); stroke: #94a3b8; }
    .box { stroke-width: 1.8; }
    .boundary { fill: rgba(15,23,42,.35); stroke: #fbbf24; stroke-width: 1.4; stroke-dasharray: 8 5; }
    .safety { fill: rgba(136,19,55,.12); stroke: #fb7185; stroke-width: 1.35; stroke-dasharray: 5 5; }
    .chipText { fill: #e2e8f0; font-size: 9px; font-weight: 600; }
  </style>
</defs>
<title id="title">From Folder Soup to Portable Intent</title>
<desc id="desc">Agent Brain explains what owns each artifact before anything is adopted or applied</desc>
<rect width="1200" height="760" class="bg"/>
<rect x="70" y="104" width="1060" height="492" rx="14" class="panel"/>
<rect x="94" y="128" width="1012" height="444" rx="10" class="gridPanel"/>
<circle cx="84" cy="44" r="6" fill="#22d3ee" filter="url(#glow)"/>
<text x="104" y="50" class="title">From Folder Soup to Portable Intent</text>
<text x="104" y="78" class="subtitle">Agent Brain explains what owns each artifact before anything is adopted or applied</text>

<path class="arrow" d="M 342 338 H 438"/><text x="390" y="321" class="tiny" text-anchor="middle">doctor scan</text>
<path class="arrow" d="M 680 338 H 776"/><text x="728" y="321" class="tiny" text-anchor="middle">adopt intent</text>
<path class="safeArrow" d="M 918 420 C 918 488 558 488 558 420"/><text x="738" y="506" class="tiny" text-anchor="middle">conflicts explained by ownership, not raw path diffs</text>

<rect x="108" y="160" width="246" height="338" rx="12" class="safety"/>
<text x="231" y="184" text-anchor="middle" fill="#fb7185" font-size="11" font-weight="700">messy live reality</text>
<rect x="130" y="210" width="202" height="62" rx="6" fill="#0f172a"/>
<rect x="130" y="210" width="202" height="62" rx="6" class="box external"/>
<text x="231" y="230" text-anchor="middle" class="smallLabel">.claude</text>
<text x="231" y="248" text-anchor="middle" class="sub">skills + plugins</text>
<text x="231" y="262" text-anchor="middle" class="sub">auth + cache</text>
<rect x="130" y="292" width="202" height="62" rx="6" fill="#0f172a"/>
<rect x="130" y="292" width="202" height="62" rx="6" class="box external"/>
<text x="231" y="312" text-anchor="middle" class="smallLabel">.codex</text>
<text x="231" y="330" text-anchor="middle" class="sub">profiles + AGENTS.md</text>
<text x="231" y="344" text-anchor="middle" class="sub">history + runtime</text>
<rect x="130" y="374" width="202" height="62" rx="6" fill="#0f172a"/>
<rect x="130" y="374" width="202" height="62" rx="6" class="box external"/>
<text x="231" y="394" text-anchor="middle" class="smallLabel">dotstate / dotfiles</text>
<text x="231" y="412" text-anchor="middle" class="sub">symlinks + overrides</text>
<text x="231" y="426" text-anchor="middle" class="sub">foreign tool state</text>

<rect x="438" y="240" width="242" height="196" rx="8" fill="#0f172a"/>
<rect x="438" y="240" width="242" height="196" rx="8" class="box backend"/>
<text x="559" y="265" text-anchor="middle" class="label">Ownership Classifier</text>
<text x="559" y="287" text-anchor="middle" class="sub">portable-source</text>
<text x="559" y="302" text-anchor="middle" class="sub">generated-target</text>
<text x="559" y="317" text-anchor="middle" class="sub">native-owned</text>
<text x="559" y="332" text-anchor="middle" class="sub">runtime-cache</text>
<text x="559" y="347" text-anchor="middle" class="sub">machine-local</text>
<text x="559" y="362" text-anchor="middle" class="sub">secret / unknown</text>
<rect x="462" y="458" width="92" height="24" rx="12" class="backend" stroke-width="1.2"/>
<text x="508" y="474" text-anchor="middle" class="chipText">adopt</text>
<rect x="564" y="458" width="92" height="24" rx="12" class="securityFill" stroke-width="1.2"/>
<text x="610" y="474" text-anchor="middle" class="chipText">exclude</text>

<rect x="776" y="222" width="252" height="108" rx="8" fill="#0f172a"/>
<rect x="776" y="222" width="252" height="108" rx="8" class="box database"/>
<text x="902" y="247" text-anchor="middle" class="label">Agent Brain Repo</text>
<text x="902" y="269" text-anchor="middle" class="sub">packages + profiles</text>
<text x="902" y="284" text-anchor="middle" class="sub">provenance + exclusions</text>
<text x="902" y="299" text-anchor="middle" class="sub">materialization locks</text>
<rect x="776" y="372" width="252" height="92" rx="8" fill="#0f172a"/>
<rect x="776" y="372" width="252" height="92" rx="8" class="box frontend"/>
<text x="902" y="397" text-anchor="middle" class="label">App Targets</text>
<text x="902" y="419" text-anchor="middle" class="sub">Claude Code adapter</text>
<text x="902" y="434" text-anchor="middle" class="sub">Codex adapter</text>

<rect x="80" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="102" cy="652" r="4" fill="#22d3ee" filter="url(#glow)"/>
<text x="116" y="657" class="label">Not Dotfiles 2.0</text>
<text x="102" y="684" class="sub">- dotfiles remain import sources</text>
<text x="102" y="701" class="sub">- the durable unit is capability intent</text>
<text x="102" y="718" class="sub">- app homes are materialization targets</text>
<rect x="435" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="457" cy="652" r="4" fill="#34d399" filter="url(#glow)"/>
<text x="471" y="657" class="label">USP</text>
<text x="457" y="684" class="sub">- explainability before portability</text>
<text x="457" y="701" class="sub">- guarded mutation after evidence</text>
<text x="457" y="718" class="sub">- semantic conflicts instead of merge guesses</text>
<rect x="790" y="622" width="330" height="116" rx="10" class="panel"/>
<circle cx="812" cy="652" r="4" fill="#a78bfa" filter="url(#glow)"/>
<text x="826" y="657" class="label">Primary Persona</text>
<text x="812" y="684" class="sub">- power user with useful messy setup</text>
<text x="812" y="701" class="sub">- wants machine portability</text>
<text x="812" y="718" class="sub">- refuses blanket sync risk</text>
<text x="600" y="744" text-anchor="middle" class="tiny">Agent Brain - product wedge and user pain</text>
</svg>
