name: Publish npm Package

on:
  release:
    types: [published]
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package smoke
        run: npm run pack:smoke

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Read package version
        id: package
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stop if version is already published
        run: |
          if npm view @leonardsellem/agent-brain@${PACKAGE_VERSION} version >/dev/null 2>&1; then
            echo "@leonardsellem/agent-brain@${PACKAGE_VERSION} is already published"
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance

      - name: Write publish evidence
        run: |
          {
            echo "## npm publish evidence"
            echo ""
            echo "- Package: @leonardsellem/agent-brain"
            echo "- Version: ${PACKAGE_VERSION}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- npm: https://www.npmjs.com/package/@leonardsellem/agent-brain/v/${PACKAGE_VERSION}"
            echo "- Verification: npm test, typecheck, build, pack smoke, and moderate audit passed"
          } >> "$GITHUB_STEP_SUMMARY"
